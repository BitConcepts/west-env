extends: ''
name: west-env
type: library-python
platforms:
- windows
- linux
- macos
language: python
spec_version: '0.3.0'
description: '`west-env` is a workspace-first west extension for reproducible Zephyr
  build environments. It lets a standard west works'
services: false
shell_wrappers: false
exec_shims: true
git_init: false
vcs_platform: github
branching_strategy: gitflow
default_branch: main
develop_branch: develop
require_pr_reviews: true
required_approvals: 1
require_ci_pass: true
allow_force_push: false
use_remote_rules: false
verification_tools: {}
detected_build_system: pyproject
detected_test_framework: pytest
license: MIT
community_files:
- contributing
- license
- security
- coc
- pr-template
- issue-templates
integrations:
- agents-md
enable_epistemic: false
epistemic_threshold: 0.7
enable_trace_vault: false
